function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2) }
function formatDateShort(ts, fechaStr, horaStr) {
  const hora = horaStr || new Date(ts).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
  if (fechaStr) {
    const todayCheck = (() => {
      const n = new Date()
      return String(n.getDate()).padStart(2,'0') + '/' + String(n.getMonth()+1).padStart(2,'0') + '/' + String(n.getFullYear()).slice(-2)
    })()
    const fechaSolo = fechaStr.trim().substring(0,8)
    const horaDisplay = hora || (fechaStr.trim().length > 8 ? fechaStr.trim().substring(9) : '')
    return fechaSolo === todayCheck ? `Hoy ${horaDisplay}` : fechaStr.trim()
  }
  const d = new Date(ts)
  const today = new Date()
  const isToday = d.toDateString() === today.toDateString()
  return isToday ? `Hoy ${hora}` : d.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit' }) + ` ${hora}`
}
function formatDate(ts) {
  const d = new Date(ts)
  return d.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' +
         d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' })
}

const css = `

function normalizarTexto(t) {
  if (!t) return ''
  return t.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim()
}

function coincideFlexible(filtro, nombre) {
  if (!filtro || !nombre) return false
  const sFiltro = normalizarTexto(filtro)
  const sNombre = normalizarTexto(nombre)
  const tokensFiltro = sFiltro.split(/\s+/).filter(t => t.length > 1)
  const tokensNombre = sNombre.split(/\s+/)
  if (!tokensFiltro.length) return false

  let coincidencias = 0
  for (const palabra of tokensFiltro) {
    for (const candidata of tokensNombre) {
      if (palabra === candidata) { coincidencias++; break }
      if (palabra.length > 3 && candidata.length > 3 &&
         (candidata.includes(palabra) || palabra.includes(candidata))) { coincidencias++; break }
      // Levenshtein simple inline
      const maxErr = palabra.length <= 4 ? 1 : 2
      const s1 = palabra, s2 = candidata
      if (Math.abs(s1.length - s2.length) > maxErr) continue
      let prev = Array.from({length: s2.length+1}, (_,i) => i)
      let found = false
      for (let i = 0; i < s1.length; i++) {
        const curr = [i+1]
        for (let j = 0; j < s2.length; j++) {
          curr.push(Math.min(prev[j+1]+1, curr[j]+1, prev[j]+(s1[i]!==s2[j]?1:0)))
        }
        prev = curr
      }
      if (prev[s2.length] <= maxErr) { coincidencias++; break }
    }
  }
  return tokensFiltro.length === 1
    ? coincidencias === 1
    : (coincidencias / tokensFiltro.length) >= 0.60
}

async function validarDNI(dni, nombre) {
  if (MOCK_DNI) {
    await new Promise(r => setTimeout(r, 800))
    if (dni.endsWith('0')) return { found: false }
    if (dni.endsWith('1')) return { found: true, match: false, apiName: 'GONZALEZ PEDRO OSCAR', apiCuil: null }
    const apiName = nombre.toUpperCase().split(' ').reverse().join(' ')
    return { found: true, match: true, apiName, apiCuil: '20' + dni + '3' }
  }

  try {
    const res = await fetch(`${API_BASE}/combined_nosis/${dni}`)
    if (!res.ok) return { error: true }
    const data = await res.json()
    const apiName = data.nombre || data.name || null
    const apiCuil = data.cuil || null
    if (!apiName || apiName === 'ERROR' || apiName === 'NO_MATCH') return { found: false }
    const match = coincideFlexible(nombre, apiName)
    return { found: true, match, apiName: apiName.toUpperCase(), apiCuil }
  } catch {
    return { error: true }
  }
}

    if (k === 'nombre') { setDniResult(null); setDniKept(false) }

      }, 50)

    return Object.keys(e).length === 0
  }

  const handleSubmit = () => {
    if (!validate()) return
    setShowConfirm(true)
  }

  const handleConfirm = async () => {
    setSaving(true)
    await new Promise(r => setTimeout(r, 500))
    const num = form.numero.replace(/\D/g,'').replace(/^0+/,'')
    const dniNum = form.dni.replace(/\D/g,'')

    // Solo reemplaza si la API detectó coincidencia automáticamente (status ok)
    // Si el promotor eligió "dejar como está" (dniKept), NO reemplaza nada
    const nombreFinal = (dniResult?.status === 'ok' && !dniKept)
      ? dniResult.apiName
      : form.nombre.trim().toUpperCase()
    const dniFinal = (dniResult?.status === 'ok' && !dniKept && dniResult.apiCuil)
      ? dniResult.apiCuil
      : dniNum

    onSave({
      id: genId(), ts: Date.now(), status: isOnline ? 'sent' : 'pending',
      nombre: nombreFinal,
      numero: num,
      dni: dniFinal,
      obraSocial: form.obraSocial.trim(), grupoFliar: form.grupoFliar.trim(),
      horario: form.horario.trim(), empresa: form.empresa.trim(),
      localidad: form.localidad.trim(), obs: form.obs.trim(), tipo: form.tipo,
      dniValidado: dniResult?.status === 'ok',
    })
    setSaving(false)
    setShowConfirm(false)
  }

  // Render del estado del DNI
  const renderDniStatus = () => {
    if (dniLoading) return (
      <div className="ig-dni-status ig-dns-loading">
        <div className="ig-spinner"/> <span>Verificando DNI...</span>
      </div>
    )
    if (!dniResult) return null
    if (dniResult.status === 'offline') return (
      <div className="ig-dni-status ig-dns-warn">
        <span>⚡ Sin internet — se validará al sincronizar</span>
      </div>
    )
    if (dniResult.status === 'error') return (
      <div className="ig-dni-status ig-dns-warn">
        <span>⚠ No se pudo conectar al servidor</span>
      </div>
    )
    if (dniResult.status === 'notfound') return (
      <div className="ig-dni-status ig-dns-warn">
        <span>⚠ DNI no encontrado en la base de datos</span>
      </div>
    )
    if (dniResult.status === 'ok') return (
      <div className="ig-dni-status ig-dns-ok">
        <span>✓ {dniResult.apiName}{dniResult.apiCuil ? ` · CUIL: ${dniResult.apiCuil}` : ''}</span>
      </div>
    )
    if (dniResult.status === 'fail') {
      if (dniKept) return (
        <div className="ig-dni-status ig-dns-warn">
          <span>⚠ Guardado como ingresado (sin verificar)</span>
        </div>
      )
      return (
        <div style={{marginTop:8}}>
          <div className="ig-dni-status ig-dns-fail" style={{marginTop:0,borderRadius:'8px 8px 0 0'}}>
            <span>✗ No coincide — encontrado en base: <b>{dniResult.apiName}</b></span>
          </div>
          <button
            onClick={() => setDniKept(true)}
            style={{
              width:'100%', padding:'10px 14px', background:'#FEF3C7',
              border:'1px solid #FCD34D', borderTop:'none',
              borderRadius:'0 0 8px 8px', fontFamily:'DM Sans,sans-serif',
              fontSize:13, fontWeight:600, color:'#92400E', cursor:'pointer',
              textAlign:'left'
            }}>
            → Dejar el dato como está igual
          </button>
        </div>
      )
    }
    return null
  }

  return (
    <div>
      <div className="ig-topbar">
        <div className="ig-topbar-inner">
          <div className="ig-topbar-left">
            <TopbarLogo />
            <div>
              <div className="ig-topbar-sub">Igualdad Salud</div>
              <h2>Nuevo dato</h2>
            </div>
          </div>
          <button className="ig-topbar-btn" onClick={onBack}><IconBack /></button>
        </div>
      </div>

      <div className="ig-content">
        {/* CLIENTE */}
        <div className="ig-form-section">
          <div className="ig-form-section-title">👤 Afiliado</div>
          <div className="ig-field">
            <label>Nombre completo *</label>
            <input className={errs.nombre?'err':''} value={form.nombre}
              onChange={e=>set('nombre',e.target.value)} placeholder="Alex" />
            {errs.nombre && <div className="ig-err-msg">{errs.nombre}</div>}
          </div>
          <div className="ig-field">
            <label>Teléfono *</label>
            <input className={errs.numero?'err':''} value={form.numero}
              onChange={e=>set('numero',e.target.value)} placeholder="1123456789"
              inputMode="numeric" maxLength={12} />
            {errs.numero && <div className="ig-err-msg">{errs.numero}</div>}
          </div>
          <div className="ig-field">
            <label>DNI</label>
            <input className={errs.dni?'err':''} value={form.dni}
              onChange={e=>set('dni',e.target.value)} placeholder="40123456"
              inputMode="numeric" maxLength={8} />
            {renderDniStatus()}
            {errs.dni && <div className="ig-err-msg">{errs.dni}</div>}
          </div>

        {/* COBERTURA */}

          <div className="ig-field">

            {errs.obraSocial && <div className="ig-err-msg">{errs.obraSocial}</div>}
          </div>
          <div className="ig-field">

function HojaDeRutaScreen({ user, onBack, showToast }) {
  const todayRuta = (() => {
    const n = new Date()
    return String(n.getDate()).padStart(2,'0') + '/' + String(n.getMonth()+1).padStart(2,'0') + '/' + String(n.getFullYear()).slice(-2)
  })()
  const [fecha, setFecha] = useState(todayRuta)
  const [localidad, setLocalidad] = useState('')
  const [localidadCustom, setLocalidadCustom] = useState('')
  const [mostrarCustom, setMostrarCustom] = useState(false)
  const [empresas, setEmpresas] = useState([{ empresa: '', direccion: '', horario: '12:00' }])
  const [saving, setSaving] = useState(false)
  const [errs, setErrs] = useState({})

  const localidadFinal = mostrarCustom ? localidadCustom : localidad
  const addEmpresa = () => setEmpresas(e => [...e, { empresa: '', direccion: '', horario: '12:00' }])
  const removeEmpresa = (i) => setEmpresas(e => e.filter((_, idx) => idx !== i))
  const setEmpresa = (i, k, v) => setEmpresas(e => e.map((x, idx) => idx === i ? {...x, [k]: v} : x))

  const validate = () => {
    const e = {}
    if (!localidadFinal.trim()) e.localidad = 'Seleccioná una localidad'
    empresas.forEach((emp, i) => { if (!emp.empresa.trim()) e['empresa_' + i] = 'Requerido' })
    setErrs(e)
    return Object.keys(e).length === 0
  }

  const handleGuardar = async () => {
    if (!validate()) return
    setSaving(true)
    try {
      await fetch(RUTA_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          promotor: ((user.apellido || '') + ' ' + (user.nombre || '')).trim().toUpperCase(),
          fecha, localidad: localidadFinal.trim(), empresas
        })
      })
      showToast('✓ Hoja de ruta enviada')
      onBack()
    } catch { showToast('⚠ Error al enviar') }
    setSaving(false)
  }

  return (
    <div>
      <div className="ig-topbar">
        <div className="ig-topbar-inner">
          <div className="ig-topbar-left">
            <TopbarLogo />
            <div>
              <div className="ig-topbar-sub">Igualdad Salud</div>
              <h2>Hoja de ruta</h2>
            </div>
          </div>
          <button className="ig-topbar-btn" onClick={onBack}><IconBack /></button>
        </div>
      </div>
      <div className="ig-content">
        <div className="ig-form-section">
          <div className="ig-form-section-title">📅 Datos generales</div>
          <div className="ig-field">
            <label>Fecha</label>
            <input value={fecha} onChange={e => setFecha(e.target.value)} placeholder="dd/mm/aa" />
          </div>
          <div className="ig-field">
            <label>Localidad</label>
            {!mostrarCustom
              ? <>
                  <select className={errs.localidad ? 'err' : ''} value={localidad}
                    onChange={e => setLocalidad(e.target.value)}
                    style={{color: localidad ? '#1E293B' : '#94A3B8'}}>
                    <option value="">Seleccioná...</option>
                    {LOCALIDADES.map(l => <option key={l} value={l}>{l}</option>)}
                  </select>
                  {errs.localidad && <div className="ig-err-msg">{errs.localidad}</div>}
                  <button onClick={() => setMostrarCustom(true)}
                    style={{marginTop:8,background:'none',border:'none',color:'#00AEEF',
                      fontFamily:'DM Sans,sans-serif',fontSize:13,fontWeight:600,cursor:'pointer',padding:0}}>
                    + Otra localidad
                  </button>
                </>
              : <>
                  <input className={errs.localidad ? 'err' : ''} value={localidadCustom}
                    onChange={e => setLocalidadCustom(e.target.value)}
                    placeholder="Escribí la localidad" autoFocus />
                  {errs.localidad && <div className="ig-err-msg">{errs.localidad}</div>}
                  <button onClick={() => { setMostrarCustom(false); setLocalidadCustom('') }}
                    style={{marginTop:8,background:'none',border:'none',color:'#94A3B8',
                      fontFamily:'DM Sans,sans-serif',fontSize:13,fontWeight:600,cursor:'pointer',padding:0}}>
                    ← Volver a la lista
                  </button>
                </>
            }
          </div>
        </div>

        {empresas.map((emp, i) => (
          <div key={i} className="ig-ruta-empresa">
            <div className="ig-ruta-empresa-header">
              <span className="ig-ruta-empresa-num">Empresa {i + 1}</span>
              {empresas.length > 1 && (
                <button className="ig-ruta-remove" onClick={() => removeEmpresa(i)}>✕</button>
              )}
            </div>
            <div className="ig-field">
              <label>Empresa *</label>
              <input className={errs['empresa_' + i] ? 'err' : ''} value={emp.empresa}
                onChange={e => setEmpresa(i, 'empresa', e.target.value)} placeholder="Nombre de la empresa" />
              {errs['empresa_' + i] && <div className="ig-err-msg">{errs['empresa_' + i]}</div>}
            </div>
            <div className="ig-field">
              <label>Dirección</label>
              <input value={emp.direccion} onChange={e => setEmpresa(i, 'direccion', e.target.value)} placeholder="Calle 123" />
            </div>
            <div className="ig-field">
              <label>Horario</label>
              <select value={emp.horario} onChange={e => setEmpresa(i, 'horario', e.target.value)}>
                {HORARIOS.map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          </div>
        ))}

        <button className="ig-btn ig-btn-secondary" onClick={addEmpresa} style={{marginBottom:4}}>
          + Agregar empresa
        </button>
      </div>
      <div className="ig-floating">
        <button className="ig-btn ig-btn-success" onClick={handleGuardar} disabled={saving}>
          {saving ? <><div className="ig-spinner ig-spinner-white"/> Enviando...</> : '✓ Guardar hoja de ruta'}
        </button>
      </div>
    </div>
  )
}

        <button className="ig-btn ig-btn-primary" onClick={() => setShowForm(true)} style={{marginBottom:4}}>
          + Nuevo usuario
        </button>

        {loading
          ? <div className="ig-empty"><div className="ig-spinner" style={{margin:'0 auto'}}/></div>
          : <div className="ig-admin-card">
              {usuarios.length === 0
                ? <div style={{padding:'20px',textAlign:'center',color:'#94A3B8',fontSize:14}}>No hay usuarios</div>
                : usuarios.map(u => (
                    <div key={u.id} className="ig-user-row">
                      <div className="ig-user-avatar">{initials(u)}</div>
                      <div className="ig-user-info">
                        <div className="ig-user-nombre">{u.apellido} {u.nombre}</div>
                        <div className="ig-user-usuario">@{u.usuario}{u.esAdmin ? ' · admin' : ''}</div>
                      </div>
                      <button
                        className={`ig-toggle ${u.activo ? 'ig-toggle-on' : 'ig-toggle-off'}`}
                        onClick={() => toggleUsuario(u)}
                        disabled={u.usuario === user.usuario}
                      />
                      {!u.esAdmin && u.usuario !== user.usuario && (
  <button
    onClick={() => eliminarUsuario(u)}
    style={{
      width:32, height:32, border:'none', borderRadius:8,
      background:'rgba(239,68,68,0.08)', color:'#EF4444',
      cursor:'pointer', fontSize:15, display:'flex',
      alignItems:'center', justifyContent:'center', flexShrink:0
    }}>✕</button>
)}
                    </div>
                  ))
              }
            </div>
        }
      </div>

      {showForm && (
        <div className="ig-overlay">
          <div className="ig-overlay-sheet">
            <h3>Nuevo usuario</h3>
            {formErr && <div style={{background:'#FEE2E2',color:'#991B1B',borderRadius:8,padding:'10px 12px',fontSize:13,marginBottom:12}}>{formErr}</div>}
            <div className="ig-field">
              <label>Apellido</label>
              <input value={form.apellido} onChange={e=>setForm(f=>({...f,apellido:e.target.value}))} placeholder="Peralta" autoCapitalize="words" />
            </div>
            <div className="ig-field">
              <label>Nombre</label>
              <input value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} placeholder="Alex" autoCapitalize="words" />
            </div>
            <div className="ig-field">
              <label>Usuario</label>
              <input value={form.usuario} onChange={e=>setForm(f=>({...f,usuario:e.target.value}))} placeholder="alexp" autoCapitalize="none" />
            </div>
            <div className="ig-field" style={{marginBottom:20}}>
              <label>Contraseña</label>
              <input type="password" value={form.pass} onChange={e=>setForm(f=>({...f,pass:e.target.value}))} placeholder="••••••••" />
            </div>
            <button className="ig-btn ig-btn-success" onClick={crearUsuario} disabled={saving} style={{marginBottom:10}}>
              {saving ? <><div className="ig-spinner ig-spinner-white"/> Guardando...</> : '✓ Crear usuario'}
            </button>
            <button className="ig-btn ig-btn-secondary" onClick={() => { setShowForm(false); setFormErr('') }}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  )
}

// ══════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════
function App() {
const [screen, setScreen] = useState('login') // login | home | form | detail | admin | stats | ruta
  const [user, setUser] = useState(null)
  const [datos, setDatos] = useState([])
  const [isOnline, setIsOnline] = useState(true)
  const [detailDato, setDetailDato] = useState(null)
  const [toast, setToast] = useState({ msg: '', show: false })
  const toastTimer = useRef(null)

  useEffect(() => {
    const session = localStorage.getItem('ig_session')
    if (session) {
      try {
        const data = JSON.parse(session)
        setUser(data)
        // Restaurar datos guardados
        const datosGuardados = localStorage.getItem('ig_datos_' + data.usuario)
        if (datosGuardados) setDatos(JSON.parse(datosGuardados))
        setScreen('home')
      } catch {}
    }
  }, [])

  useEffect(() => {
    const update = async () => {
      const online = navigator.onLine
      setIsOnline(online)
      if (online) {
        const pendientes = JSON.parse(localStorage.getItem('ig_pendientes') || '[]')
        if (pendientes.length > 0) {
          let enviados = 0
          const idsSincronizados = []
          for (const dato of pendientes) {
            try {
              await enviarASheets(dato, dato.usuario)
              enviados++
              idsSincronizados.push(dato.id)
            } catch {}
          }
          if (enviados > 0) {
            const pendientesRestantes = pendientes.filter(d => !idsSincronizados.includes(d.id))
            if (pendientesRestantes.length === 0) {
              localStorage.removeItem('ig_pendientes')
            } else {
              localStorage.setItem('ig_pendientes', JSON.stringify(pendientesRestantes))
            }
            // Actualizar status en el array de datos
            setDatos(prev => {
              const updated = prev.map(d => idsSincronizados.includes(d.id) ? {...d, status: 'sent'} : d)
              const session = JSON.parse(localStorage.getItem('ig_session') || '{}')
              if (session.usuario) localStorage.setItem('ig_datos_' + session.usuario, JSON.stringify(updated.slice(0, 50)))
              return updated
            })
            showToast('✓ ' + enviados + ' dato(s) sincronizado(s)')
          }
        }
      }
    }
    window.addEventListener('online', update)
    window.addEventListener('offline', update)
    update()
    return () => {
      window.removeEventListener('online', update)
      window.removeEventListener('offline', update)
    }
  }, [])

  const showToast = (msg) => {
    clearTimeout(toastTimer.current)
    setToast({ msg, show: true })
    toastTimer.current = setTimeout(() => setToast(t => ({...t, show: false})), 2500)
  }

  const handleLogin = (userData) => {
    setUser(userData)
    setScreen('home')
  }

  const handleLogout = () => {
  if (!window.confirm('¿Cerrar sesión?')) return
  localStorage.removeItem('ig_session')
  setUser(null)
  setDatos([])
  setScreen('login')
}


  const handleSave = async (dato) => {
    const datoConUsuario = { ...dato, usuario: user?.usuario }
    setDatos(d => {
      const nuevo = [datoConUsuario, ...d]
      localStorage.setItem('ig_datos_' + user?.usuario, JSON.stringify(nuevo.slice(0, 50)))
      return nuevo
    })
    setScreen('home')
    if (isOnline) {
      try {
        await enviarASheets(datoConUsuario, user?.usuario)
        showToast('✓ Dato guardado y enviado a Drive')
      } catch {
        const pendientes = JSON.parse(localStorage.getItem('ig_pendientes') || '[]')
        pendientes.push(datoConUsuario)
        localStorage.setItem('ig_pendientes', JSON.stringify(pendientes))
        showToast('⚠ Error al enviar — guardado para reintentar')
      }
    } else {
      const pendientes = JSON.parse(localStorage.getItem('ig_pendientes') || '[]')
      pendientes.push(datoConUsuario)
      localStorage.setItem('ig_pendientes', JSON.stringify(pendientes))
      showToast('💾 Sin conexión — se enviará al conectar')
    }
  }

  return (
    <>
      <style>{css}</style>
      <div className="ig-app">
        <div className={`ig-offline ${!isOnline ? 'show' : ''}`}>
          ⚡ Sin conexión — los datos se guardan localmente
        </div>

        {screen === 'login' && <LoginScreen onLogin={handleLogin} />}
        {screen === 'home' && (
          <HomeScreen
            user={user} datos={datos} setDatos={setDatos} isOnline={isOnline}
            onNuevo={() => setScreen('form')}
            onVerDato={(d) => { setDetailDato(d); setScreen('detail') }}
            onLogout={handleLogout}
            onAdmin={() => setScreen('admin')}
            onStats={() => setScreen('stats')}
            onRuta={() => setScreen('ruta')}

            onSync={() => showToast(isOnline ? '🔄 Sincronizando...' : '⚡ Sin conexión')}
          />
        )}
        {screen === 'form' && (
          <FormScreen
            onBack={() => setScreen('home')}
            onSave={handleSave}
            isOnline={isOnline}
          />
        )}
        {screen === 'detail' && detailDato && (
          <DetailScreen
            dato={detailDato}
            onBack={() => setScreen('home')}
          />
        )}
        {screen === 'admin' && (
          <AdminScreen
            user={user}
            onBack={() => setScreen('home')}
            showToast={showToast}
          />
        )}
        {screen === 'stats' && (
          <StatsScreen onBack={() => setScreen('home')} />
        )}
                {screen === 'ruta' && (
          <HojaDeRutaScreen
            user={user}
            onBack={() => setScreen('home')}
            showToast={showToast}
          />
        )}

        <div className={`ig-toast ${toast.show ? 'show' : ''}`}>{toast.msg}</div>
      </div>
    </>
  )
}

    const { useState, useEffect, useRef } = React;
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/promotores/sw.js')
    }
  </script>
</body>
</html>
