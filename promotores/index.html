function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2) }
function formatDateShort(ts) {
  const d = new Date(ts)
  const today = new Date()
  const isToday = d.toDateString() === today.toDateString()
  const time = d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
  return isToday ? `Hoy ${time}` : d.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit' }) + ` ${time}`
}
function formatDate(ts) {
  const d = new Date(ts)
  return d.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' +
         d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' })
}

const AUTH_BASE = 'https://ssh.ccomisiones.com/auth'
const API_BASE = 'http://192.168.2.122/api'

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzWFYTz0M0YEliE1fn7luflLLVSTY559owOjftU2xIO8ZpJuHcDyzz7SCVSyW4tegUt/exec'

async function enviarASheets(dato, usuario) {
  const payload = {
    jid: 'APP_' + (usuario || 'PROMOTOR').toUpperCase(),
    payload: {
      tipo_dato: dato.tipo,
      nombre_final: dato.nombre,
      numero: dato.numero,
      dni_final: dato.dni,
      obra_social: dato.obraSocial,
      horario: dato.horario,
      grupo_fliar: dato.grupoFliar,
      empresa: dato.empresa,
      localidad: dato.localidad,
      obs: dato.obs,
    }
  }
  await fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  return true
}


function normalizarTexto(t) {
  if (!t) return ''
  return t.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim()
}

function coincideFlexible(filtro, nombre) {
  if (!filtro || !nombre) return false
  const sFiltro = normalizarTexto(filtro)
  const sNombre = normalizarTexto(nombre)
  const tokensFiltro = sFiltro.split(/\s+/).filter(t => t.length > 1)
  const tokensNombre = sNombre.split(/\s+/)
  if (!tokensFiltro.length) return false

  let coincidencias = 0
  for (const palabra of tokensFiltro) {
    for (const candidata of tokensNombre) {
      if (palabra === candidata) { coincidencias++; break }
      if (palabra.length > 3 && candidata.length > 3 &&
         (candidata.includes(palabra) || palabra.includes(candidata))) { coincidencias++; break }
      // Levenshtein simple inline
      const maxErr = palabra.length <= 4 ? 1 : 2
      const s1 = palabra, s2 = candidata
      if (Math.abs(s1.length - s2.length) > maxErr) continue
      let prev = Array.from({length: s2.length+1}, (_,i) => i)
      let found = false
      for (let i = 0; i < s1.length; i++) {
        const curr = [i+1]
        for (let j = 0; j < s2.length; j++) {
          curr.push(Math.min(prev[j+1]+1, curr[j]+1, prev[j]+(s1[i]!==s2[j]?1:0)))
        }
        prev = curr
      }
      if (prev[s2.length] <= maxErr) { coincidencias++; break }
    }
  }
  return tokensFiltro.length === 1
    ? coincidencias === 1
    : (coincidencias / tokensFiltro.length) >= 0.60
}

async function validarDNI(dni, nombre) {
  if (MOCK_DNI) {
    await new Promise(r => setTimeout(r, 800))
    if (dni.endsWith('0')) return { found: false }
    if (dni.endsWith('1')) return { found: true, match: false, apiName: 'GONZALEZ PEDRO OSCAR', apiCuil: null }
    const apiName = nombre.toUpperCase().split(' ').reverse().join(' ')
    return { found: true, match: true, apiName, apiCuil: '20' + dni + '3' }
  }

  try {
    const res = await fetch(`${API_BASE}/combined_nosis/${dni}`)
    if (!res.ok) return { error: true }
    const data = await res.json()
    const apiName = data.nombre || data.name || null
    const apiCuil = data.cuil || null
    if (!apiName || apiName === 'ERROR' || apiName === 'NO_MATCH') return { found: false }
    const match = coincideFlexible(nombre, apiName)
    return { found: true, match, apiName: apiName.toUpperCase(), apiCuil }
  } catch {
    return { error: true }
  }
}

function LoginScreen({ onLogin }) {
  const [user, setUser] = useState('')
  const [pass, setPass] = useState('')
  const [loading, setLoading] = useState(false)
  const [err, setErr] = useState('')
  const [fieldErrs, setFieldErrs] = useState({})

const handleLogin = async () => {
  const errs = {}
  if (!user.trim()) errs.user = 'Ingresá tu usuario'
  if (!pass) errs.pass = 'Ingresá tu contraseña'
  if (Object.keys(errs).length) { setFieldErrs(errs); return }
  setFieldErrs({})
  setLoading(true)
  setErr('')
  try {
    const res = await fetch(`${AUTH_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario: user.trim(), pass })
    })
    const data = await res.json()
    if (!res.ok) { setErr(data.detail || 'Error al ingresar'); setLoading(false); return }
    localStorage.setItem('ig_session', JSON.stringify(data))
    onLogin(data)
  } catch {
    setErr('No se pudo conectar al servidor')
  }
  setLoading(false)
}

  return (
    <div className="ig-login">
      <div className="ig-login-card">
        <div className="ig-logo">
          <div className="ig-logo-icon">
            <img src="/promotores/icon-192.png" width="120" height="120" style={{borderRadius:'0px'}} />
          </div>
          <h1>Igualdad Salud</h1>
          <p>Sistema de promotores</p>
        </div>
        {err && <div className="ig-login-err">{err}</div>}
        <div className="ig-field">
          <label>Usuario</label>
          <input className={fieldErrs.user ? 'err' : ''} value={user} onChange={e => setUser(e.target.value)}
            placeholder="tu.usuario" onKeyDown={e => e.key === 'Enter' && handleLogin()} />
          {fieldErrs.user && <div className="ig-err-msg">{fieldErrs.user}</div>}
        </div>
        <div className="ig-field">
          <label>Contraseña</label>
          <input type="password" className={fieldErrs.pass ? 'err' : ''} value={pass} onChange={e => setPass(e.target.value)}
            placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && handleLogin()} />
          {fieldErrs.pass && <div className="ig-err-msg">{fieldErrs.pass}</div>}
        </div>
        <button className="ig-btn ig-btn-primary" style={{marginTop:8}} onClick={handleLogin} disabled={loading}>
          {loading ? <><div className="ig-spinner ig-spinner-white"/>&nbsp;Ingresando...</> : 'Ingresar'}
        </button>
        <div style={{marginTop:16,fontSize:12,color:'#94A3B8',textAlign:'center'}}>
          Demo: <b>promotor1</b> / <b>1234</b>
        </div>
      </div>
    </div>
  )
}

function HomeScreen({ user, datos, isOnline, onNuevo, onVerDato, onLogout, onSync }) {
  const today = new Date().toDateString()
  const hoy = datos.filter(d => new Date(d.ts).toDateString() === today).length
  const pendientes = datos.filter(d => d.status === 'pending').length
  const recientes = [...datos].sort((a, b) => b.ts - a.ts).slice(0, 10)

  const badgeClass = (d) => {
    if (d.status === 'pending') return 'ig-badge ig-badge-pending'
    if (d.tipo?.includes('AVISO')) return 'ig-badge ig-badge-aviso'
    if (d.tipo?.includes('REFERIDO')) return 'ig-badge ig-badge-referido'
    return 'ig-badge ig-badge-diario'
  }
  const badgeText = (d) => d.status === 'pending' ? '⏳ Pendiente' : (d.tipo || 'DIARIO')

  return (
    <div>
      <div className="ig-topbar">
        <div className="ig-topbar-inner">
          <div className="ig-topbar-left">
            <TopbarLogo />
            <div>
              <div className="ig-topbar-sub">Igualdad Salud</div>
              <h2>{user.nombre}</h2>
            </div>
          </div>
          <button className="ig-topbar-btn" onClick={onLogout}><IconLogout /></button>
        </div>
      </div>

      <div className="ig-content">
        <div className="ig-stat-row">
          <div className="ig-stat-card">
            <div className="ig-stat-num">{hoy}</div>
            <div className="ig-stat-label">Hoy</div>
          </div>
          <div className="ig-stat-card">
            <div className="ig-stat-num">{pendientes}</div>
            <div className="ig-stat-label">Pendientes</div>
          </div>
        </div>

        <button className="ig-cta" onClick={onNuevo}>
          <h3>Nuevo dato</h3>
          <p>Cargar cliente nuevo</p>
        </button>

        <div className="ig-sync-row" onClick={onSync}>
          <div className={`ig-sync-dot ${isOnline ? 'ig-dot-online' : 'ig-dot-offline'}`} />
          <span>{isOnline
            ? pendientes > 0 ? `Online — ${pendientes} por sincronizar` : 'Online — todo sincronizado'
            : 'Sin conexión — guardando localmente'
          }</span>
        </div>

        <div>
          <div className="ig-section-title">Últimos datos</div>
          {recientes.length === 0
            ? <div className="ig-empty">
                <div className="ig-empty-icon">📋</div>
                <p>No hay datos cargados todavía</p>
              </div>
            : recientes.map(d => (
                <div key={d.id} className="ig-dato-item" onClick={() => onVerDato(d)}>
                  <div className="ig-dato-avatar">👤</div>
                  <div className="ig-dato-info">
                    <div className="ig-dato-nombre">{d.nombre}</div>
                    <div className="ig-dato-sub">{formatDateShort(d.ts)} · {d.numero}</div>
                  </div>
                  <span className={badgeClass(d)}>{badgeText(d)}</span>
                </div>
              ))
          }
        </div>
      </div>
    </div>
  )
}

function FormScreen({ onBack, onSave, isOnline }) {
  const [form, setForm] = useState({
    nombre: '', numero: '', dni: '', obraSocial: '', grupoFliar: '',
    horario: '', empresa: '', localidad: '', obs: '', tipo: ''
  })
  const [errs, setErrs] = useState({})
  // dniResult: null | { status: 'ok'|'fail'|'notfound'|'error', apiName, apiCuil }
  const [dniResult, setDniResult] = useState(null)
  // dniKept: el promotor eligió dejar el dato como está pese al mismatch
  const [dniKept, setDniKept] = useState(false)
  const [dniLoading, setDniLoading] = useState(false)
  const [showConfirm, setShowConfirm] = useState(false)
  const [saving, setSaving] = useState(false)
  const dniTimer = useRef(null)

  const set = (k, v) => {
    setForm(f => ({ ...f, [k]: v }))
    // Si cambia el DNI, resetear estado previo
    if (k === 'dni') { setDniResult(null); setDniKept(false) }
    if (k === 'nombre') { setDniResult(null); setDniKept(false) }
  }

  // DNI validation en tiempo real
  useEffect(() => {
    clearTimeout(dniTimer.current)
    const dni = form.dni.replace(/\D/g, '')
    if (!dni || dni.length < 7 || !form.nombre.trim()) {
      setDniResult(null); setDniKept(false); setDniLoading(false); return
    }
    if (!isOnline) {
      setDniResult({ status: 'offline' }); setDniKept(false); return
    }
    setDniLoading(true)
    setDniResult(null)
    setDniKept(false)
    dniTimer.current = setTimeout(async () => {
      const r = await validarDNI(dni, form.nombre)
      setDniLoading(false)
      if (r.error) setDniResult({ status: 'error' })
      else if (!r.found) setDniResult({ status: 'notfound' })
      else if (r.match) setDniResult({ status: 'ok', apiName: r.apiName, apiCuil: r.apiCuil })
      else setDniResult({ status: 'fail', apiName: r.apiName, apiCuil: r.apiCuil })
    }, 900)
  }, [form.dni, form.nombre, isOnline])

  const validate = () => {
    const e = {}
    if (form.nombre.trim().length < 3) e.nombre = 'Nombre obligatorio'
    const num = form.numero.replace(/\D/g,'').replace(/^0+/,'')
    if (num.length !== 10 && num.length !== 8) e.numero = 'Teléfono inválido (8 o 10 dígitos)'
    const dni = form.dni.replace(/\D/g,'')
    if (dni && (dni.length < 7 || dni.length > 8)) e.dni = 'DNI inválido (7 u 8 dígitos)'
    if (!form.tipo) e.tipo = 'Seleccioná el tipo de dato'
    setErrs(e)
    if (Object.keys(e).length > 0) {
      setTimeout(() => {
        const firstErr = document.querySelector('.ig-field input.err, .ig-field textarea.err')
        if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' })
      }, 50)
    }
    return Object.keys(e).length === 0
  }

  const handleSubmit = () => {
    if (!validate()) return
    setShowConfirm(true)
  }

  const handleConfirm = async () => {
    setSaving(true)
    await new Promise(r => setTimeout(r, 500))
    const num = form.numero.replace(/\D/g,'').replace(/^0+/,'')
    const dniNum = form.dni.replace(/\D/g,'')

    // Solo reemplaza si la API detectó coincidencia automáticamente (status ok)
    // Si el promotor eligió "dejar como está" (dniKept), NO reemplaza nada
    const nombreFinal = (dniResult?.status === 'ok' && !dniKept)
      ? dniResult.apiName
      : form.nombre.trim().toUpperCase()
    const dniFinal = (dniResult?.status === 'ok' && !dniKept && dniResult.apiCuil)
      ? dniResult.apiCuil
      : dniNum

    onSave({
      id: genId(), ts: Date.now(), status: isOnline ? 'sent' : 'pending',
      nombre: nombreFinal,
      numero: num,
      dni: dniFinal,
      obraSocial: form.obraSocial.trim(), grupoFliar: form.grupoFliar.trim(),
      horario: form.horario.trim(), empresa: form.empresa.trim(),
      localidad: form.localidad.trim(), obs: form.obs.trim(), tipo: form.tipo,
      dniValidado: dniResult?.status === 'ok',
    })
    setSaving(false)
    setShowConfirm(false)
  }

  // Render del estado del DNI
  const renderDniStatus = () => {
    if (dniLoading) return (
      <div className="ig-dni-status ig-dns-loading">
        <div className="ig-spinner"/> <span>Verificando DNI...</span>
      </div>
    )
    if (!dniResult) return null
    if (dniResult.status === 'offline') return (
      <div className="ig-dni-status ig-dns-warn">
        <span>⚡ Sin internet — se validará al sincronizar</span>
      </div>
    )
    if (dniResult.status === 'error') return (
      <div className="ig-dni-status ig-dns-warn">
        <span>⚠ No se pudo conectar al servidor</span>
      </div>
    )
    if (dniResult.status === 'notfound') return (
      <div className="ig-dni-status ig-dns-warn">
        <span>⚠ DNI no encontrado en la base de datos</span>
      </div>
    )
    if (dniResult.status === 'ok') return (
      <div className="ig-dni-status ig-dns-ok">
        <span>✓ {dniResult.apiName}{dniResult.apiCuil ? ` · CUIL: ${dniResult.apiCuil}` : ''}</span>
      </div>
    )
    if (dniResult.status === 'fail') {
      if (dniKept) return (
        <div className="ig-dni-status ig-dns-warn">
          <span>⚠ Guardado como ingresado (sin verificar)</span>
        </div>
      )
      return (
        <div style={{marginTop:8}}>
          <div className="ig-dni-status ig-dns-fail" style={{marginTop:0,borderRadius:'8px 8px 0 0'}}>
            <span>✗ No coincide — encontrado en base: <b>{dniResult.apiName}</b></span>
          </div>
          <button
            onClick={() => setDniKept(true)}
            style={{
              width:'100%', padding:'10px 14px', background:'#FEF3C7',
              border:'1px solid #FCD34D', borderTop:'none',
              borderRadius:'0 0 8px 8px', fontFamily:'DM Sans,sans-serif',
              fontSize:13, fontWeight:600, color:'#92400E', cursor:'pointer',
              textAlign:'left'
            }}>
            → Dejar el dato como está igual
          </button>
        </div>
      )
    }
    return null
  }

  return (
    <div>
      <div className="ig-topbar">
        <div className="ig-topbar-inner">
          <div className="ig-topbar-left">
            <TopbarLogo />
            <div>
              <div className="ig-topbar-sub">Igualdad Salud</div>
              <h2>Nuevo dato</h2>
            </div>
          </div>
          <button className="ig-topbar-btn" onClick={onBack}><IconBack /></button>
        </div>
      </div>

      <div className="ig-content">
        {/* CLIENTE */}
        <div className="ig-form-section">
          <div className="ig-form-section-title">👤 Datos</div>
          <div className="ig-field">
            <label>Nombre completo *</label>
            <input className={errs.nombre?'err':''} value={form.nombre}
              onChange={e=>set('nombre',e.target.value)} placeholder="Alex" />
            {errs.nombre && <div className="ig-err-msg">{errs.nombre}</div>}
          </div>
          <div className="ig-field">
            <label>Teléfono *</label>
            <input className={errs.numero?'err':''} value={form.numero}
              onChange={e=>set('numero',e.target.value)} placeholder="1123456789"
              inputMode="numeric" maxLength={12} />
            {errs.numero && <div className="ig-err-msg">{errs.numero}</div>}
          </div>
          <div className="ig-field">
            <label>DNI</label>
            <input className={errs.dni?'err':''} value={form.dni}
              onChange={e=>set('dni',e.target.value)} placeholder="40123456"
              inputMode="numeric" maxLength={8} />
            {renderDniStatus()}
            {errs.dni && <div className="ig-err-msg">{errs.dni}</div>}
          </div>
        </div>

        {/* COBERTURA */}
        <div className="ig-form-section">
          <div className="ig-form-section-title">🏥 Cobertura</div>
          <div className="ig-field">
            <label>Obra social *</label>
            <input className={errs.obraSocial?'err':''} value={form.obraSocial}
              onChange={e=>set('obraSocial',e.target.value)} placeholder="Osmedica, Ospatrones..." />
            {errs.obraSocial && <div className="ig-err-msg">{errs.obraSocial}</div>}
          </div>
          <div className="ig-field">
            <label>Grupo familiar</label>
            <input value={form.grupoFliar} onChange={e=>set('grupoFliar',e.target.value)}
              placeholder="2" />
          </div>
        </div>

        {/* CONTACTO */}
        <div className="ig-form-section">
          <div className="ig-form-section-title">📞 Contacto</div>
          <div className="ig-field">
            <label>Horario</label>
            <input value={form.horario} onChange={e=>set('horario',e.target.value)}
              placeholder="15hs, a la mañana..." />
          </div>
          <div className="ig-field">
            <label>Empresa</label>
            <input value={form.empresa} onChange={e=>set('empresa',e.target.value)}
              placeholder="Nombre de la empresa" />
          </div>
          <div className="ig-field">
            <label>Localidad</label>
            <input value={form.localidad} onChange={e=>set('localidad',e.target.value)}
              placeholder="Ciudad / localidad" />
          </div>
        </div>

        {/* CLASIFICACIÓN */}
        <div className="ig-form-section">
          <div className="ig-form-section-title">📋 Clasificación</div>
          <div className="ig-field">
            <label>Tipo de dato *</label>
            <div className="ig-tipo-grid">
              {[['DIARIO','📅'],['DATO AVISO','🔔'],['REFERIDO','👥']].map(([tipo, icon]) => (
                <button key={tipo} className={`ig-tipo-btn${form.tipo===tipo?' sel':''}`}
                  onClick={() => { set('tipo', tipo); setErrs(e=>({...e, tipo:null})) }}>
                  <span className="ig-tipo-icon">{icon}</span>
                  {tipo === 'DATO AVISO' ? 'AVISO' : tipo}
                </button>
              ))}
            </div>
            {errs.tipo && <div className="ig-err-msg">{errs.tipo}</div>}
          </div>
          <div className="ig-field">
            <label>Observaciones</label>
            <textarea value={form.obs} onChange={e=>set('obs',e.target.value)}
              placeholder="Notas adicionales..." />
          </div>
        </div>
      </div>

      <div className="ig-floating">
        <button className="ig-btn ig-btn-success" onClick={handleSubmit}>
          Guardar dato
        </button>
      </div>

      {showConfirm && (
        <div className="ig-overlay">
          <div className="ig-overlay-sheet">
            <h3>{(dniResult?.status==='ok' ? dniResult.apiName : form.nombre.toUpperCase())}</h3>
            <p>
              {form.tipo} · {form.obraSocial} · Tel: {form.numero}
              {dniResult?.status==='ok' && dniResult.apiCuil &&
                <><br/><span style={{fontSize:12,color:'#10B981'}}>✓ CUIL: {dniResult.apiCuil}</span></>
              }
              {dniKept &&
                <><br/><span style={{fontSize:12,color:'#F59E0B'}}>⚠ DNI no verificado — se guarda como ingresado</span></>
              }
            </p>
            <button className="ig-btn ig-btn-success" onClick={handleConfirm} disabled={saving} style={{marginBottom:10}}>
              {saving ? <><div className="ig-spinner ig-spinner-white"/> Guardando...</> : '✓ Confirmar y guardar'}
            </button>
            <button className="ig-btn ig-btn-secondary" onClick={()=>setShowConfirm(false)}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  )
}

    ['Obra Social', dato.obraSocial], ['Grupo Familiar', dato.grupoFliar || '—'],
    ['Horario', dato.horario || '—'], ['Empresa', dato.empresa || '—'],

    <div>

        <div className="ig-topbar-inner">

            <TopbarLogo />
            <div>
              <div className="ig-topbar-sub">Igualdad Salud</div>
              <h2>Detalle</h2>
            </div>
          </div>
          <button className="ig-topbar-btn" onClick={onBack}><IconBack /></button>

          {dato.status==='sent' ? '✓ Enviado al servidor' : '⏳ Pendiente de sincronización'}
        </div>
        <div className="ig-detail-card">
          {fields.map(([k,v]) => (
            <div key={k} className="ig-detail-row">
              <div className="ig-detail-key">{k}</div>
              <div className="ig-detail-val">{v}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

// ROOT APP
// ══════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('login') // login | home | form | detail
  const [user, setUser] = useState(null)
  const [datos, setDatos] = useState([])
  const [isOnline, setIsOnline] = useState(true)
  const [detailDato, setDetailDato] = useState(null)
  const [toast, setToast] = useState({ msg: '', show: false })
  const toastTimer = useRef(null)

useEffect(() => {
  const session = localStorage.getItem('ig_session')
  if (session) {
    try {
      const data = JSON.parse(session)
      setUser(data)
      setScreen('home')
    } catch {}
  }
}, [])

  useEffect(() => {
  const update = async () => {
    const online = navigator.onLine
    setIsOnline(online)
    if (online) {
      const pendientes = JSON.parse(localStorage.getItem('ig_pendientes') || '[]')
      if (pendientes.length > 0) {
        let enviados = 0
        for (const dato of pendientes) {
          try {
            await enviarASheets(dato, dato.usuario)
            enviados++
          } catch {}
        }
        if (enviados > 0) {
          localStorage.removeItem('ig_pendientes')
          showToast(`✓ ${enviados} dato(s) sincronizado(s)`)
        }
      }
    }
  }
  
  window.addEventListener('online', update)
  window.addEventListener('offline', update)
  update()
  return () => {
    window.removeEventListener('online', update)
    window.removeEventListener('offline', update)
  }
}, [])

  const showToast = (msg) => {
    clearTimeout(toastTimer.current)
    setToast({ msg, show: true })
    toastTimer.current = setTimeout(() => setToast(t => ({...t, show: false})), 2500)
  }

  const handleLogin = (userData) => {
    setUser(userData)
    setScreen('home')
  }

const handleLogout = () => {
  localStorage.removeItem('ig_session')
  setUser(null)
  setDatos([])
  setScreen('login')
}
const handleSave = async (dato) => {
  const datoConUsuario = { ...dato, usuario: user?.usuario }
  setDatos(d => [datoConUsuario, ...d])
  setScreen('home')
  if (isOnline) {
    try {
      await enviarASheets(datoConUsuario, user?.usuario)
      showToast('✓ Dato guardado y enviado a Drive')
    } catch {
      const pendientes = JSON.parse(localStorage.getItem('ig_pendientes') || '[]')
      pendientes.push(datoConUsuario)
      localStorage.setItem('ig_pendientes', JSON.stringify(pendientes))
      showToast('⚠ Error al enviar — guardado para reintentar')
    }
  } else {
    const pendientes = JSON.parse(localStorage.getItem('ig_pendientes') || '[]')
    pendientes.push(datoConUsuario)
    localStorage.setItem('ig_pendientes', JSON.stringify(pendientes))
    showToast('💾 Sin conexión — se enviará al conectar')
  }
}

  return (
    <>
      <style>{css}</style>
      <div className="ig-app">
        <div className={`ig-offline ${!isOnline ? 'show' : ''}`}>
          ⚡ Sin conexión — los datos se guardan localmente
        </div>

        {screen === 'login' && <LoginScreen onLogin={handleLogin} />}
        {screen === 'home' && (
          <HomeScreen
            user={user} datos={datos} isOnline={isOnline}
            onNuevo={() => setScreen('form')}
            onVerDato={(d) => { setDetailDato(d); setScreen('detail') }}
            onLogout={handleLogout}
            onSync={() => showToast(isOnline ? '🔄 Sincronizando...' : '⚡ Sin conexión')}
          />
        )}
        {screen === 'form' && (
          <FormScreen
            onBack={() => setScreen('home')}
            onSave={handleSave}
            isOnline={isOnline}
          />
        )}
        {screen === 'detail' && detailDato && (
          <DetailScreen
            dato={detailDato}
            onBack={() => setScreen('home')}
          />
        )}

        <div className={`ig-toast ${toast.show ? 'show' : ''}`}>{toast.msg}</div>
      </div>
    </>
  )
}

    const { useState, useEffect, useRef } = React;
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/promotores/sw.js')
    }
  </script>
</body>
</html>
